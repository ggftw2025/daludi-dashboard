// ─── COMPONENTS ────────────────────────────────────────────────
function Tag({ text, color, bg }) {
  return (
    <span style={{
      display: "inline-block",
      background: bg || "#f0f0f0",
      color: color || "#555",
      border: `1px solid ${color || "#ddd"}`,
      borderRadius: 4,
      padding: "2px 7px",
      fontSize: 11,
      fontWeight: 500,
      marginRight: 4,
      marginBottom: 4,
    }}>{text}</span>
  );
}

function NodeList({ nodes }) {
  return (
    <ul style={{ margin: 0, padding: 0, listStyle: "none" }}>
      {nodes.map((n, i) => (
        <li key={i} style={{
          fontSize: 12.5,
          color: "#333",
          marginBottom: 5,
          display: "flex",
          gap: 6,
          alignItems: "flex-start",
          lineHeight: 1.4,
        }}>
          <span style={{
            flexShrink: 0,
            marginTop: 3,
            fontSize: 8,
            color: n.ai ? "#e53935" : "#bbb",
          }}>
            {n.ai ? "🤖" : "◆"}
          </span>
          <span>
            {n.text}
            {n.ai && n.when && (
              <span style={{
                marginLeft: 6,
                background: "#fce4ec",
                color: "#c62828",
                borderRadius: 3,
                padding: "0 5px",
                fontSize: 10,
                fontWeight: 600,
              }}>{n.when}</span>
            )}
          </span>
        </li>
      ))}
    </ul>
  );
}

function RoleCard({ role, expanded, onToggle, isCEO }) {
  return (

      background: "#fff",

      borderRadius: 12,

      fontFamily: "'Noto Sans TC', sans-serif",
      boxShadow: expanded
        ? `0 6px 28px ${role.accent}40`
        : "0 2px 10px rgba(0,0,0,0.06)",
      transition: "box-shadow 0.3s",
      minWidth: isCEO ? 300 : 250,
      maxWidth: isCEO ? 340 : 300,
    }}>
      {/* Header */}
      <div
        onClick={onToggle}
        style={{
          background: role.color,
          padding: isCEO ? "18px 22px" : "13px 18px",
          cursor: "pointer",
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
        }}
      >
        <div>
          <div style={{
            color: role.accent,
            fontSize: 10,
            letterSpacing: 2.5,
            fontWeight: 700,
            textTransform: "uppercase",
            marginBottom: 2,
          }}>{role.title}</div>
          <div style={{
            color: "#fff",
            fontSize: isCEO ? 17 : 14,
            fontWeight: 600,
          }}>{role.sub}</div>
        </div>
        <div style={{
          color: role.accent,
          fontSize: 18,
          transition: "transform 0.3s",
          transform: expanded ? "rotate(180deg)" : "rotate(0deg)",
        }}>▾</div>
      </div>

      {expanded && (
        <div style={{ padding: "14px 18px 12px" }}>

          {/* Work Nodes */}
          <div style={{ fontSize: 10, letterSpacing: 1.5, color: "#999", fontWeight: 700, marginBottom: 7, textTransform: "uppercase" }}>
            工作節點
          </div>
          <NodeList nodes={role.nodes} />

          {/* Key Projects */}
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 10, letterSpacing: 1.5, color: "#999", fontWeight: 700, marginBottom: 6, textTransform: "uppercase" }}>
              2026 重大項目
            </div>
            {role.projects.map((p, i) => (
              <div key={i} style={{ fontSize: 12, color: "#444", marginBottom: 4, lineHeight: 1.4 }}>{p}</div>
            ))}
          </div>

          {/* Systems */}
          <div style={{ marginTop: 10 }}>
            <div style={{ fontSize: 10, letterSpacing: 1.5, color: "#999", fontWeight: 700, marginBottom: 5, textTransform: "uppercase" }}>使用系統</div>
            <div style={{ display: "flex", flexWrap: "wrap" }}>
              {role.systems.map((s, i) => (
                <Tag key={i} text={s} color={role.color} bg={`${role.color}12`} />
              ))}
            </div>
          </div>

          {/* Auto Targets */}
          {role.autoTargets && (
            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 10, letterSpacing: 1.5, color: "#999", fontWeight: 700, marginBottom: 5, textTransform: "uppercase" }}>⚡ 自動化目標</div>

      )}

  );
}

            padding: "4px 12px", fontSize: 14, fontWeight: 700, flexShrink: 0,
          }}>Q1</div>
          <div>
            <div style={{ fontSize: 12, color: "#999" }}>1–3月 ｜ 已完成</div>
            <div style={{ fontSize: 13, color: "#555" }}>招募財務+運營中 / 正航ERP廠商會議（4/7）/ 3月出貨額~211萬</div>
          </div>
          <div style={{ marginLeft: "auto", background: "#e8f5e9", color: "#388e3c", borderRadius: 5, padding: "3px 10px", fontSize: 11, fontWeight: 700 }}>
            進行中
          </div>
        </div>

        {QUARTERS.map(q => (
          <QuarterCard key={q.id} q={q} expanded={!!exp[q.id]} onToggle={() => toggle(q.id)} />
        ))}
      </div>

      {/* Dept OKRs */}
      <DeptOKRs />

      {/* Key constraints */}
      <div style={{
        maxWidth: 900, margin: "24px auto 0",
        background: "#1a1a2e", borderRadius: 12, padding: "18px 24px",
        fontFamily: "'Noto Sans TC', sans-serif",
      }}>
        <div style={{ fontSize: 10, letterSpacing: 3, color: "#e8c547", fontWeight: 700, marginBottom: 10 }}>
          ⚠️ 今年最關鍵的三個限制條件
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12 }}>
          {[
            { title: "人員交接期 Q2", desc: "財務+運營新人Q2才穩定，這段時間CEO仍需高度介入，不要同時啟動太多新項目" },
            { title: "正航上線 Q4 摩擦", desc: "10-12月系統切換會消耗財務+運營大量注意力，Q4業務衝刺需要銷售和行銷主扛" },
            { title: "ToC 100萬是挑戰", desc: "從零到100萬需要漏斗建好+廣告跑通+出貨流程支撐，三者缺一。Q2不啟動Q3就來不及" },
          ].map((c, i) => (
            <div key={i} style={{
              background: "rgba(255,255,255,0.07)", borderRadius: 8,
              padding: "12px 14px", borderLeft: "3px solid #e53935",
            }}>
              <div style={{ color: "#e8c547", fontSize: 12, fontWeight: 700, marginBottom: 6 }}>{c.title}</div>
              <div style={{ color: "#ccc", fontSize: 12, lineHeight: 1.5 }}>{c.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


function App() {
  const [page, setPage] = React.useState("okr");
  return (
    <div>
      <nav>
        <span className="nav-brand">大綠地 2026</span>
        <button className={"nav-btn" + (page==="okr" ? " active" : "")} onClick={()=>setPage("okr")}>OKR 路線圖</button>
        <button className={"nav-btn" + (page==="org" ? " active" : "")} onClick={()=>setPage("org")}>組織架構</button>
      </nav>
      {page === "okr" ? <OKRDashboard /> : <OrgChart />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
